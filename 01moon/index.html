<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Moon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Pistilli&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=37" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="month-chip" class="hidden">
    <span id="month-number">1</span>
    <span id="month-name">January</span>
  </div>
  <div id="today-date" class="hidden" aria-hidden="true"></div>

  <!-- TODAY ボタン（独立：左下） -->
  <button id="today-btn" type="button" aria-label="今日の月相に合わせる">
    <span>TODAY</span>
  </button>

  <!-- 着地ボタン（地球フォーカス & 宇宙視点のときのみ表示） -->
  <button id="land-btn" class="hidden" type="button" aria-label="地球に降り立つ">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 28" fill="none"
         stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <!-- 下向き矢印（太め） -->
      <line x1="16" y1="2" x2="16" y2="19" stroke-width="2.5"/>
      <polyline points="9,13 16,20 23,13" stroke-width="2.5"/>
      <!-- 地平線（地球の弧） -->
      <path d="M2 25 Q16 21 30 25" stroke-width="1.8"/>
    </svg>
    <span>地表へ</span>
  </button>

  <!-- 地上視点 UI（地上視点のときのみ表示） -->
  <div id="ground-ui" class="hidden">
    <!-- 宇宙に戻るボタン -->
    <button id="jump-btn" type="button" aria-label="宇宙に戻る">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 28" fill="none"
           stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <!-- 地平線（地球の弧） -->
        <path d="M2 3 Q16 7 30 3" stroke-width="1.8"/>
        <!-- 上向き矢印（太め） -->
        <line x1="16" y1="9" x2="16" y2="26" stroke-width="2.5"/>
        <polyline points="9,15 16,8 23,15" stroke-width="2.5"/>
      </svg>
      <span>宇宙へ</span>
    </button>
    <!-- 国旗（1枚表示→クリックで展開） -->
    <div id="ground-flags">
      <button id="ground-flag-current" class="ground-flag-btn" type="button" aria-label="観測国">
        <img alt="" />
      </button>
      <div id="ground-flag-menu" class="hidden"></div>
    </div>
  </div>

  <div id="orientation-gate" aria-hidden="true">
    <div class="og-inner">
      <div class="og-icon">📱</div>
      <div class="og-text">横向きにしてください</div>
      <div class="og-sub">Please rotate your device</div>
    </div>
  </div>
  <script type="module" src="main.js?v=37"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スプラ動画フレーム — 検証版(BOKE-1)</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    margin: 0; padding: 20px; background: #11131a; color: #eef; line-height: 1.6;
    max-width: 560px; margin-inline: auto;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #8b93a7; margin-bottom: 20px; }
  .card { background: #1b1e29; border: 1px solid #2a2f40; border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  label.file {
    display: block; text-align: center; padding: 22px 14px; border: 2px dashed #3a4a6a;
    border-radius: 12px; cursor: pointer; background: #161922; transition: .2s;
  }
  input[type=file] { display: none; }
  .btn {
    display: block; width: 100%; padding: 16px; font-size: 16px; font-weight: 700;
    border: none; border-radius: 12px; background: #4f7cff; color: #fff; cursor: pointer; margin-top: 12px;
  }
  .btn:disabled { background: #39405a; color: #7b8198; cursor: default; }
  .status { font-size: 13px; color: #9aa3ba; min-height: 20px; white-space: pre-wrap; }
  .bar { height: 8px; background: #2a2f40; border-radius: 6px; overflow: hidden; margin: 10px 0; }
  .bar > i { display: block; height: 100%; width: 0; background: #4f7cff; transition: width .2s; }
  video { width: 100%; border-radius: 10px; background: #000; margin-top: 8px; }
  a.dl { display: block; text-align: center; padding: 14px; background: #2bd576; color: #062; font-weight: 700; border-radius: 12px; text-decoration: none; margin-top: 12px; }
  .note { font-size: 12px; color: #8b93a7; margin-top: 10px; }
  .scrub-wrap { margin-top: 12px; }
  .scrub-label { font-size: 13px; color: #cdd6f4; font-weight: 700; margin-bottom: 6px; }
  input[type=range] { width: 100%; accent-color: #4f7cff; height: 28px; }
</style>
</head>
<body>
  <h1>スプラ動画フレーム <span style="color:#4f7cff">検証版</span></h1>
  <div class="sub">Phase 1 技術検証 / 演出「BOKE-1：静止＋白黒＋鐘」。決めの瞬間を選んで書き出します。</div>

  <div class="card">
    <label class="file" id="picker">
      🎬 タップして動画を選ぶ
      <input type="file" id="file" accept="video/*">
    </label>
    <div class="note" id="picked"></div>

    <div id="editor" style="display:none">
      <video id="preview" playsinline muted preload="auto" controls></video>
      <div class="scrub-wrap">
        <div class="scrub-label" id="scrubLabel">決めの瞬間：—</div>
        <input type="range" id="scrub" min="0" max="100" value="100" step="0.05">
        <div class="note">スライダーを動かして「ここで止めたい！」という瞬間を選んでください。本編はそこまで再生され、その瞬間で静止＋白黒＋鐘が3秒鳴ります。</div>
      </div>
    </div>

    <button class="btn" id="go" disabled>装飾をつけて書き出す</button>
    <div class="bar"><i id="prog"></i></div>
    <div class="status" id="status">準備OK。動画を選んでください。</div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <strong>仕上がりプレビュー</strong>
    <video id="out" controls playsinline></video>
    <a class="dl" id="dl" download="splatoon_boke1.mp4">⬇ 動画を保存する</a>
    <div class="note">iPhoneの場合：保存ボタン→共有メニューから「ビデオを保存」を選ぶとカメラロールに入ります。</div>
  </div>

<script src="vendor/ffmpeg.js"></script>
<script src="vendor/util.js"></script>
<script>
const HOLD = 3; // 静止＋白黒＋鐘を持続させる秒数
const $ = id => document.getElementById(id);
let ffmpeg = null, chosen = null, lastUrl = null, previewUrl = null, videoDur = 0;

const setStatus = (m) => { $('status').textContent = m; };
const setProg = (p) => { $('prog').style.width = Math.round(p*100) + '%'; };
const fmt = (s) => { s = Math.max(0, s); const m = Math.floor(s/60); const r = (s%60).toFixed(1); return `${m}:${r.padStart(4,'0')}`; };

function updateScrubLabel() {
  $('scrubLabel').textContent = '決めの瞬間：' + fmt(parseFloat($('scrub').value)) + ' / ' + fmt(videoDur);
}

$('file').addEventListener('change', e => {
  chosen = e.target.files[0] || null;
  if (!chosen) return;
  $('picked').textContent = '選択: ' + chosen.name + ' (' + (chosen.size/1048576).toFixed(1) + 'MB)';
  if (previewUrl) URL.revokeObjectURL(previewUrl);
  previewUrl = URL.createObjectURL(chosen);
  const pv = $('preview');
  // 先にエディタを表示してから動画を読み込む（iOSは非表示videoのフレームを描画しないため）
  $('editor').style.display = 'block';
  pv.src = previewUrl;
  pv.load();
  pv.onloadedmetadata = () => {
    videoDur = pv.duration || 0;
    const sc = $('scrub');
    sc.max = videoDur.toFixed(2);
    sc.value = videoDur.toFixed(2);      // 既定は末尾
    updateScrubLabel();
    $('go').disabled = false;
    setStatus('決めの瞬間を選んで「装飾をつけて書き出す」を押してください。');
  };
  // フレーム描画を確実にする：一度muted再生→即停止でiOSにフレームを出させ、末尾へシーク
  pv.onloadeddata = async () => {
    try { await pv.play(); pv.pause(); } catch (_) {}
    seekPreview(Math.max(0, (pv.duration || 0) - 0.05));
  };
});

// プレビューを安全にシーク（seekable範囲にクランプ）
function seekPreview(t) {
  const pv = $('preview');
  const dur = pv.duration || 0;
  let tt = Math.max(0, Math.min(t, Math.max(0, dur - 0.03)));
  try { pv.currentTime = tt; } catch (_) {}
}

$('scrub').addEventListener('input', () => {
  seekPreview(parseFloat($('scrub').value));
  updateScrubLabel();
});

function lockUI(lock) {
  $('go').disabled = lock;
  $('file').disabled = lock;
  $('scrub').disabled = lock;
  $('picker').style.pointerEvents = lock ? 'none' : '';
  $('picker').style.opacity = lock ? '0.5' : '';
}

async function loadFFmpeg() {
  if (ffmpeg) return ffmpeg;
  setStatus('処理エンジンを読み込み中…（初回は時間がかかります）');
  const { FFmpeg } = FFmpegWASM;
  ffmpeg = new FFmpeg();
  ffmpeg.on('log', ({ message }) => { (window.__fflog ||= []).push(message); console.log('[ffmpeg]', message); });
  ffmpeg.on('progress', ({ progress }) => { if (progress >= 0 && progress <= 1) setProg(progress); });
  const abs = (p) => new URL(p, location.href).href;
  await ffmpeg.load({
    classWorkerURL: abs('vendor/814.ffmpeg.js'),
    coreURL: abs('vendor/ffmpeg-core.js'),
    wasmURL: abs('vendor/ffmpeg-core.wasm'),
  });
  return ffmpeg;
}

// 本物の鐘(bell.mp3)があれば優先、無ければ合成のbell.wav
async function pickBellFile() {
  try { const r = await fetch('bell.mp3', { method: 'HEAD' }); if (r.ok) return 'bell.mp3'; } catch (_) {}
  return 'bell.wav';
}

async function run() {
  lockUI(true);
  $('resultCard').style.display = 'none';
  setProg(0);
  try {
    const ff = await loadFFmpeg();
    const { fetchFile } = FFmpegUtil;

    setStatus('動画を読み込み中…');
    const bellName = await pickBellFile();
    await ff.writeFile('in.mp4', await fetchFile(chosen));
    await ff.writeFile(bellName, await fetchFile(bellName));

    // 音声トラックの有無を事前検出（無参照でabortする経路を避ける）
    window.__fflog = [];
    try { await ff.exec(['-hide_banner','-i','in.mp4']); } catch (_) { /* 出力未指定で正常にエラー終了する */ }
    const hasAudio = (window.__fflog || []).some(l => /Stream #0:\d+.*Audio/i.test(l));

    // 決めの瞬間（フリーズ点）
    const tf = Math.max(0.1, Math.min(videoDur || 9999, parseFloat($('scrub').value) || videoDur));
    const tfms = Math.round(tf * 1000);
    const total = (tf + HOLD).toFixed(2);

    setStatus('装飾を焼き込み中…（スマホだと数十秒かかることがあります）');

    // 本編は決めの瞬間まで再生 → そこで最後のコマを静止＋白黒化＋鐘、HOLD秒持続
    const vid  = `[0:v]trim=0:${tf},setpts=PTS-STARTPTS,scale=-2:720,tpad=stop_mode=clone:stop_duration=${HOLD},hue=s=0:enable='gte(t,${tf})'[v]`;
    const bell = `[1:a]adelay=${tfms}|${tfms}[b]`;
    const enc  = ['-c:v','libx264','-preset','ultrafast','-pix_fmt','yuv420p','-crf','23','-c:a','aac','-b:a','128k','-movflags','+faststart','-t',total,'out.mp4'];

    let cmd;
    if (hasAudio) {
      const a0 = `[0:a]atrim=0:${tf},asetpts=PTS-STARTPTS[a0]`;
      cmd = ['-i','in.mp4','-i',bellName,'-filter_complex',
        `${vid};${a0};${bell};[a0][b]amix=inputs=2:duration=longest:normalize=0[a]`,
        '-map','[v]','-map','[a]', ...enc];
    } else {
      cmd = ['-i','in.mp4','-i',bellName,'-filter_complex',
        `${vid};${bell}`,
        '-map','[v]','-map','[b]', ...enc];
    }
    await ff.exec(cmd);

    setStatus('仕上げ中…');
    const data = await ff.readFile('out.mp4');
    const blob = new Blob([data.buffer], { type: 'video/mp4' });

    // 内部FSを掃除してメモリを解放（スマホのメモリ対策）
    for (const f of ['in.mp4', 'out.mp4']) { try { await ff.deleteFile(f); } catch (_) {} }

    // 前回の出力URLを解放してから差し替え（メモリ漏れ防止）
    if (lastUrl) { URL.revokeObjectURL(lastUrl); lastUrl = null; }
    const url = URL.createObjectURL(blob);
    lastUrl = url;
    $('out').src = url;
    $('dl').href = url;
    $('resultCard').style.display = 'block';
    setProg(1);
    setStatus('完成！下のプレビューで確認 → 保存できます。');
  } catch (err) {
    console.error(err);
    const msg = (err && err.message) ? err.message : String(err);
    setStatus('エラー: ' + msg + '\n（途中で固まった/落ちた場合は、この端末には処理が重すぎた可能性があります）');
  } finally {
    lockUI(false);
  }
}

$('go').addEventListener('click', run);
window.__appReady = true;
</script>
</body>
</html>
